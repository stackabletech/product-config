#apiVersion: productconfig.stackable.tech/v1
#kind: ProductConfig
#metadata:
  #name: simple
#spec:
  ###
  ### Validiert experiments::test_experiment_load_sample_product_config()
  ###
config:
  units:
    - unit: &unit_url
        name: "url"
        regex: "^((spark|https?|ftp|file)://)?[-a-zA-Z0-9+&@#}\\/%?=~_|!:,.;]*[-a-zA-Z0-9+&@#\\/%=~_|]"
        examples: ["https://www.stackable.de/blog/"]
    - unit: &unit_port
        name: "port"
        regex: "^([0-9]{1,4}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"

applications:
  - product: "spark"
    roles: ["master", "worker"]
    versions: &spark_master_worker_all_versions ### dieses Anchor wird unten referenziert. kann Rust das ?
      from: "0.1"
      to: "3.9"
      list: ["2.9-bugfix", "3.0-alpha"]

    cli:
      command: "/foo/bar.sh start-foreground --port={{port}} {{postfix}}"

      properties:
        - property: &dependant_property
            name: "dependant_property"
            nullable: false # damit kann der user das kommando erweitern wenn er will
            datatype:
              kind: "string"
            default_values:
              - versions: *spark_master_worker_all_versions
                value: ""
        - property:
            name: "port"
            nullable: false ### heisst de fakto required!
            datatype:
              kind: "integer"
              min: "1"
              max: "65535"
              unit: *unit_port
              #allowed_values: ["a", "b"]
            default_values:
              - versions:
                  from: "0.5.0"
                  to: "0.9.11"
                value: "20000"
              - versions:
                  list: ["2.9-bugfix"]
                value: "30000"
            recommended_values:
              - versions:
                  from: "0.5.0"
                  to: "0.9.11"
                value: "20000"
              - versions:
                  list: [ "3.0-alpha"]
                value: "30000"
            deprecated:
              - versions:
                  from: "0.5"
                message: "This property is deprecated blabla..."
            depends_on:
              - property: *dependant_property
                recommended_value:
                  - versions:
                      from: "0.5.0"
                      to: "0.9.11"
                    value: "42"
            restart_required: true
            tags: ["network", "port"]
            additional_doc: "some_doc"
            comment: "Always has to be present"
            description: "The port where clients connect to."
        - property:
            name: "postfix"
            nullable: true ### damit kann der user das kommando erweitern wenn er will
            datatype:
              kind: "string"
            default_values:
              - versions: *spark_master_worker_all_versions
                value: ""

    files:
      - name: "env.sh"
        template: "templates/spark/common/version-123/env.sh.template"

        properties:
          - property:
              name: "master.port"
              datatype:
                kind: "integer"
                min: "1"
                max: "65535"
                unit: *unit_port
              recommended_values:
                - versions:
                    from: "0.5.0"
                    to: "0.9.11"
                  value: "20000"
                - versions:
                    list: [ "1.0.0", "2.0.0"]
                  value: "30000"

    env:
      properties:
        - property:
            name: "MASTER_PORT"
            nullable: false ### heisst de fakto required!
            datatype:
              kind: "integer"
              min: "1"
              max: "65535"
              unit: *unit_port
            default_values:
              - versions:
                  from: "0.5.0"
                  to: "0.9.11"
                value: "20000"
              - versions:
                  list: ["2.9-bugfix"]
                value: "30000"
            recommended_values:
              - versions:
                  from: "0.5.0"
                  to: "0.9.11"
                value: "20000"
              - versions:
                  list: [ "3.0-alpha"]
                value: "30000"
