#apiVersion: productconfig.stackable.tech/v1
#kind: ProductConfig
#metadata:
  #name: simple
#spec:
  ###
  ### Validiert experiments::test_experiment_load_sample_product_config()
  ###
config:
  units:
    - unit: &unit_url
        name: "url"
        regex: "^((spark|https?|ftp|file)://)?[-a-zA-Z0-9+&@#}\\/%?=~_|!:,.;]*[-a-zA-Z0-9+&@#\\/%=~_|]"
        examples: ["https://www.stackable.de/blog/"]
    - unit: &unit_port
        name: "port"
        regex: "^([0-9]{1,4}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"

products:
  - name: "spark"
    versions: &spark_master_worker_all_versions
      from: "0.1"
      to: "2.0"
      list: ["2.9-bugfix", "3.0-alpha"]

    properties:
      - property: &foo_port
          name: "foo_port"
          nullable: false
          datatype:
            kind: "integer"
            unit: *unit_port
          recommended_values:
            - versions: *spark_master_worker_all_versions
              value: "10000"
      - property: &bar
          name: "bar"
          nullable: false
          datatype:
            kind: "string"
          default_values:
            - versions:
                from: "0.5.0"
                to: "0.9.11"
              value: "20000"
            - versions:
                list: [ "2.9-bugfix" ]
              value: "30000"
          recommended_values:
            - versions:
                from: "0.5.0"
                to: "0.9.11"
              value: "20000"
            - versions:
                list: [ "3.0-alpha" ]
              value: "30000"
          deprecated:
            - versions:
                from: "0.5"
              message: "This property is deprecated blabla..."
      - property: &foo
          name: "foo"
          nullable: false
          datatype:
            kind: "integer"
            min: 1000
            max: 12000
          recommended_values:
            - versions: *spark_master_worker_all_versions
              value: "10000"
          deprecated:
            - versions:
                from: "0.5"
              message: "This property is deprecated blabla..."
          depends_on:
            - property: *bar
              recommended_value:
                - versions:
                    from: "0.5.0"
                    to: "0.9.11"
                  value: "42"

    commands:
      - name: "start"
        version:
        command: "./start.sh start master"
        commandArgs: "..."
        roles: ["master"]
        cli:
          - *foo_port
          - *bar
        files:
          - name: "my_properties.conf"
            - properties:
                - *foo_port
          - name: "my_env.sh"
              properties:
                - *bar
      - name: "start"
        version:
        command: "./start.sh start worker"
        commandArgs: "--port={{port}} {{postfix}} x=a,b,c y=[a;b;c]"
        roles: ["worker"]
        cli:
          - *foo_port
        files:
          - name: "my_properties.conf"
            template: "java/hadoop.xml/custom"
            properties:
              - *foo_port
          - name: "my_env.sh"
            properties:
              - *foo
