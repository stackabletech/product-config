units:
  - unit: &unitDirectory
      name: "directory"
      regex: "^/|(/[\\w-]+)+$"
      examples: ["/tmp/xyz"]
  - unit: &unitPort
      name: "port"
      regex: "^([0-9]{1,4}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"

products:
  - name: "zookeeper"
    version: &zookeeper_all_versions
      from: "3.4.14"
      to: "3.5.8"
      list: []

    properties:
      - property: &clientPort
          name: "clientPort"
          nullable: false
          datatype:
            kind: "integer"
            min: 1025
            max: 65535
          recommendedValues:
            - versions: *zookeeper_all_versions
              value: "6666"
      - property: &dataDir
          name: "dataDir"
          nullable: false
          datatype:
            kind: "integer"
            unit: *unitDirectory
          recommendedValues:
            - versions: *zookeeper_all_versions
              value: "5"
      - property: &initLimit
          name: "initLimit"
          nullable: false
          datatype:
            kind: "integer"
          recommendedValues:
            - versions: *zookeeper_all_versions
              value: "5"
      - property: &syncLimit
          name: "syncLimit"
          nullable: false
          datatype:
            kind: "integer"
          recommendedValues:
            - versions: *zookeeper_all_versions
              value: "2"
      - property: &tickTime
          name: "tickTime"
          nullable: false
          datatype:
            kind: "integer"
          recommendedValues:
            - versions: *zookeeper_all_versions
              value: "2000"
      - property: &myid
          name: "myid"
          nullable: false
          datatype:
            kind: "integer"

    commands:
      - name: "start"
        version:
          from: "3.0.0"
          to: "3.4.14"
        command: ["zookeeper-{{CR_ACTUAL_VERSION}}/bin/zkServer.sh",
                  "start-foreground",
                  "{{{{raw}}}}{{configroot}}{{{{/raw}}}}/conf/zoo.cfg"]
        roles: ["server"]
        cli: []
        env: []
        files:
          - name: "zoo.cfg"
            template: "javaProperties"
            properties:
              - *clientPort
              - *dataDir
              - *tickTime
              - *syncLimit
              - *initLimit
          - name: "myid"
            template: "javaProperties"
            properties:
              - *myid
      - name: "start"
        version:
          from: "3.5.0"
          to: "3.5.8"
        command: ["apache-zookeeper-{{CR_ACTUAL_VERSION}}-bin/bin/zkServer.sh",
                  "start-foreground",
                  "--config",
                  "{{{{raw}}}}{{configroot}}{{{{/raw}}}}/conf/zoo.cfg"]
        roles: ["server"]
        cli: []
        env: []
        files:
          - name: "zoo.cfg"
            template: "javaProperties"
            properties:
              - *clientPort
              - *dataDir
              - *tickTime
              - *syncLimit
              - *initLimit
          - name: "myid"
            template: "value"
            properties:
              - *myid
